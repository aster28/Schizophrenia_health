<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 Mental Health AI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  padding: 15px;
  text-align: center;
  font-size: 18px;
  background: #1e293b;
  border-bottom: 1px solid #334155;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.message {
  display: flex;
  align-items: flex-start;
  margin: 10px;
}

.avatar {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  margin-right: 10px;
  text-align: center;
  line-height: 35px;
}

.user .avatar {
  background: #3b82f6;
}

.bot .avatar {
  background: #22c55e;
}

.text {
  padding: 10px;
  border-radius: 10px;
  max-width: 70%;
}

.user .text {
  background: #3b82f6;
  color: white;
}

.bot .text {
  background: #1e293b;
}

#inputArea {
  display: flex;
  padding: 10px;
  background: #1e293b;
}

#message {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
  outline: none;
}

button {
  margin-left: 5px;
  padding: 10px;
  border-radius: 50%;
  border: none;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

.typing {
  font-style: italic;
  opacity: 0.7;
}
</style>
</head>

<body>

<header>🧠 Mental Health AI Assistant</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="message" placeholder="Ask anything..."/>
  <button onclick="sendMessage()">➤</button>
  <button onclick="startVoice()">🎤</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("message");

function addMessage(text, type) {
  const msg = document.createElement("div");
  msg.className = "message " + type;

  msg.innerHTML = `
    <div class="avatar">${type === "user" ? "🧑" : "🤖"}</div>
    <div class="text">${text}</div>
  `;

  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

// Typing indicator
let typingDiv;

function showTyping() {
  typingDiv = document.createElement("div");
  typingDiv.className = "message bot typing";
  typingDiv.innerHTML = `
    <div class="avatar">🤖</div>
    <div class="text">Typing...</div>
  `;
  chat.appendChild(typingDiv);
}

function removeTyping() {
  if (typingDiv) typingDiv.remove();
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  showTyping();

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();
    removeTyping();
    addMessage(data.reply, "bot");
    speak(data.reply);

  } catch {
    removeTyping();
    addMessage("❌ Server error", "bot");
  }
}

// 🎤 Voice input
const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recognition.lang = "en-US";

function startVoice() {
  recognition.start();
}

recognition.onresult = (event) => {
  const text = event.results[0][0].transcript;
  input.value = text;
  sendMessage();
};

// 🔊 Voice output
function speak(text) {
  const utter = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(utter);
}

// Enter key
input.addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
