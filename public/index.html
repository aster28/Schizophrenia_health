<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mental Health Chat</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f9f9f9; }
    #chat { max-width: 600px; margin: 0 auto; }
    .message { padding: 0.5rem; margin: 0.3rem 0; border-radius: 5px; }
    .user { background: #4caf50; color: white; text-align: right; }
    .bot { background: #e0e0e0; color: black; text-align: left; }
    input { width: 80%; padding: 0.5rem; margin-right: 0.5rem; }
    button { padding: 0.5rem 1rem; }
  </style>
</head>
<body>
  <div id="chat"></div>
  <div id="inputArea">
    <input type="text" id="userInput" placeholder="Ask a question..." />
    <button onclick="sendMessage()">Send</button>
  </div>

  <script src="chat.js"></script>
</body>
</html>
